# Bifrost production stack for a single VPS.
#
#   spark-server  → dashboard (/bifrost) + REST API (/) + opkg feed (/feed)
#   cloudflared   → Cloudflare Tunnel: publishes both domains with edge TLS,
#                   no open ports (default ingress)
#   caddy         → alternative direct-exposure ingress with its own TLS
#                   (opt-in: `docker compose --profile caddy up -d`)
#
# Uses the prebuilt image published by CI to GHCR — no local build needed.
#
# Setup:
#   1. cp .env.example .env           and fill in BIFROST_JWT_SECRET, TUNNEL_TOKEN, DOMAINs
#   2. docker compose pull && docker compose up -d
#      (updates: docker compose pull && docker compose up -d)
#
# With Cloudflare Tunnel, map both public hostnames to http://spark-server:8443
# in the Cloudflare Zero Trust dashboard (Tunnels → Public hostnames):
#   ${DASHBOARD_DOMAIN} → http://spark-server:8443
#   ${LANDING_DOMAIN}   → http://spark-server:8443

services:
  spark-server:
    image: ghcr.io/asctheone/bifrost-server:latest
    # To build locally instead of pulling, comment `image:` above, uncomment
    # this, and `mkdir -p secrets && echo <fa-pro-token> > secrets/fontawesome_token`,
    # plus the `secrets:` block at the bottom of this file:
    # build:
    #   context: .
    #   dockerfile: apps/spark-server/Dockerfile
    #   secrets: [fontawesome_token]
    environment:
      # Secret — supplied from .env, never baked into the image.
      BIFROST_JWT_SECRET: ${BIFROST_JWT_SECRET:?set BIFROST_JWT_SECRET in .env}
      # Paths/ports have image defaults; listed here for visibility.
      BIFROST_DATABASE_URL: sqlite:///app/data/bifrost.db
      BIFROST_DASHBOARD_DIR: /app/dashboard
      BIFROST_FEED_DIR: /app/feed
      BIFROST_BIND_ADDR: 0.0.0.0
      BIFROST_API_PORT: "8443"
      RUST_LOG: ${RUST_LOG:-spark_server=info,tower_http=info,sqlx=warn}
    volumes:
      - bifrost-data:/app/data     # sqlite database (persisted)
    # The opkg feed (GL.iNet package + index) is built into the image and served
    # at /bifrost/feed — rebuilt on each `docker compose up --build`, so no bind
    # mount is needed. To publish extra packages, mount your own dir over
    # /app/feed (with the bifrost .ipk + a regenerated Packages index).
    # No published ports: nothing is reachable from the host. cloudflared (and,
    # optionally, caddy) reach spark-server on 8443 over the internal Docker
    # network only.
    restart: unless-stopped

  # Default ingress: an outbound-only Cloudflare Tunnel. No inbound ports; TLS
  # and hostname routing are handled at Cloudflare's edge.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env}
    depends_on:
      - spark-server
    restart: unless-stopped

  # Alternative ingress for direct exposure (no Cloudflare). Opt in with:
  #   docker compose --profile caddy up -d
  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      LANDING_DOMAIN: ${LANDING_DOMAIN:?set LANDING_DOMAIN in .env}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:?set DASHBOARD_DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - spark-server
    restart: unless-stopped

# Only needed for the local-build path above (uncomment together with `build:`).
# secrets:
#   fontawesome_token:
#     file: ./secrets/fontawesome_token

volumes:
  bifrost-data:
  caddy-data:
  caddy-config:
