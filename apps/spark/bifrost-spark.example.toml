# Bifrost spark config. Copy to bifrost-spark.toml and edit.
# Override the path with BIFROST_SPARK_CONFIG=/path/to/file.toml
# Adoption state (node id + key) is written next to this file as spark-state.json.

# The Bifrost control plane (your VPS).
master_url = "https://bifrost.example.com"

# One-time adoption code from the dashboard (Add Spark). Only needed for the
# first boot; after adoption the node key is persisted and this is ignored.
adoption_code = "XXX-XXX-XXX"

# Seconds between heartbeat + UniFi reconcile cycles.
poll_interval_seconds = 30

# The local UniFi controller this spark bridges to.
[unifi]
host = "192.168.1.1"     # UniFi gateway / controller IP or hostname
port = 443
site = "default"
username = "bifrost"     # a local UniFi admin account for this spark
password = "change-me"
insecure = true          # accept the controller's self-signed TLS cert
