<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bifrost VPN</title>
<style>
  :root {
    --bg: #1c1e21; --surface: #2a2d31; --input: #3d414a; --border: #3d414a;
    --text: #f9fafa; --muted: #b7bcc2; --dim: #737c87;
    --accent: #00c0ff; --success: #37be5f; --warning: #e79613; --error: #ee6368;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; justify-content: center; align-items: flex-start; padding: 24px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    width: 100%; max-width: 460px; padding: 24px; margin-top: 24px;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .brand h1 { font-size: 22px; letter-spacing: 3px; margin: 0; }
  .brand span { color: var(--dim); font-size: 12px; letter-spacing: 2px; }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  .status {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 10px;
    background: var(--bg); margin-bottom: 20px; font-size: 14px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
  input[type=text], input[type=number] {
    width: 100%; background: var(--input); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .row label { margin: 0; color: var(--text); font-size: 14px; }
  .btns { display: flex; gap: 10px; margin-top: 22px; }
  button {
    flex: 1; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: filter .15s;
  }
  button:hover:not(:disabled) { filter: brightness(1.12); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .primary { background: var(--accent); color: #05242e; }
  .ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .danger { background: transparent; color: var(--error); border: 1px solid var(--border); }
  .msg { margin-top: 14px; font-size: 13px; min-height: 18px; }
  .msg.err { color: var(--error); } .msg.ok { color: var(--success); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><h1>BIFROST</h1><span>VPN</span></div>
    <p class="sub">Connect this router to your Bifrost VPN.</p>

    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Checking…</span></div>

    <label for="url">Provision URL</label>
    <input type="text" id="url" placeholder="http://master:8899/provision/&lt;token&gt;" />

    <div class="row">
      <input type="checkbox" id="routeLan" checked />
      <label for="routeLan">Route LAN clients through the VPN</label>
    </div>

    <div class="btns">
      <button class="primary" id="connect">Connect</button>
      <button class="danger" id="disconnect">Disconnect</button>
    </div>
    <div class="btns">
      <button class="ghost" id="refresh">Refresh config</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>

<script>
  var API = '/cgi-bin/bifrost';
  var $ = function (id) { return document.getElementById(id); };

  function setMsg(text, ok) { var m = $('msg'); m.textContent = text || ''; m.className = 'msg ' + (ok ? 'ok' : 'err'); }

  function paint(data) {
    var dot = $('dot'), t = $('statusText');
    if (data.provisionUrl && !$('url').matches(':focus')) $('url').value = data.provisionUrl;
    if (typeof data.routeLan === 'boolean') $('routeLan').checked = data.routeLan;
    if (data.state === 'up') {
      dot.style.background = 'var(--success)';
      t.textContent = 'Connected — last handshake ' + (data.handshakeAge || '?') + 's ago';
    } else if (data.enabled) {
      dot.style.background = 'var(--warning)';
      t.textContent = 'Enabled, connecting… (no handshake yet)';
    } else {
      dot.style.background = 'var(--dim)';
      t.textContent = 'Disconnected';
    }
  }

  function refreshStatus() {
    fetch(API + '?action=status').then(function (r) { return r.json(); }).then(paint).catch(function () {});
  }

  function post(action, busyBtn) {
    var body = { action: action, provisionUrl: $('url').value.trim(), routeLan: $('routeLan').checked };
    if (busyBtn) busyBtn.disabled = true;
    setMsg('');
    return fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
      .then(function (r) { return r.json(); })
      .then(function (data) { paint(data); return data; })
      .catch(function () { setMsg('Request failed — is the router reachable?', false); })
      .finally(function () { if (busyBtn) busyBtn.disabled = false; });
  }

  $('connect').onclick = function () {
    if (!$('url').value.trim()) { setMsg('Enter your provision URL first.', false); return; }
    post('connect', this).then(function (d) { if (d) setMsg('Connecting…', true); });
  };
  $('disconnect').onclick = function () { post('disconnect', this).then(function () { setMsg('Disconnected.', true); }); };
  $('refresh').onclick = function () { post('refresh', this).then(function () { setMsg('Refreshed config from master.', true); }); };

  refreshStatus();
  setInterval(refreshStatus, 5000);
</script>
</body>
</html>
