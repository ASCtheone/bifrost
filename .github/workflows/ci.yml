name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # Core correctness: build + unit-test the Rust crates that make up the current
  # architecture (control plane + on-site spark). No secrets required.
  rust:
    name: Rust build & test (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [apps/spark-server, apps/spark]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}
      - name: Build
        run: cargo build --manifest-path ${{ matrix.crate }}/Cargo.toml
      - name: Test
        run: cargo test --manifest-path ${{ matrix.crate }}/Cargo.toml

  # Build the deployable images and, on pushes to the default branch, publish
  # them to GitHub Container Registry (ghcr.io/asctheone/bifrost-*). The server
  # image pulls FontAwesome Pro, so it needs FONTAWESOME_TOKEN; without it (e.g.
  # forks) the job no-ops with a warning instead of failing.
  publish:
    name: Build & publish images (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FA_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
      # Push only on branch pushes, not PRs.
      PUSH: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip notice (no token)
        if: ${{ env.FA_TOKEN == '' }}
        run: echo "::warning::FONTAWESOME_TOKEN secret not set — skipping image build/publish. Add it in Settings → Secrets and variables → Actions to enable."

      - name: Set up Buildx
        if: ${{ env.FA_TOKEN != '' }}
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: ${{ env.FA_TOKEN != '' && env.PUSH == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: FontAwesome build secret
        if: ${{ env.FA_TOKEN != '' }}
        run: printf '%s' "$FA_TOKEN" > fa_token
      - name: Read unified version
        if: ${{ env.FA_TOKEN != '' }}
        id: ver
        run: echo "v=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Server image (dashboard + Rust)
        if: ${{ env.FA_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/spark-server/Dockerfile
          push: ${{ env.PUSH == 'true' }}
          secret-files: fontawesome_token=fa_token
          tags: |
            ghcr.io/asctheone/bifrost-server:latest
            ghcr.io/asctheone/bifrost-server:${{ steps.ver.outputs.v }}
            ghcr.io/asctheone/bifrost-server:${{ github.sha }}

      - name: Spark image (on-site UniFi bridge)
        if: ${{ env.FA_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: apps/spark
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ghcr.io/asctheone/bifrost-spark:latest
            ghcr.io/asctheone/bifrost-spark:${{ steps.ver.outputs.v }}
            ghcr.io/asctheone/bifrost-spark:${{ github.sha }}

      - name: Updater image (control-plane self-update sidecar)
        if: ${{ env.FA_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: apps/updater
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ghcr.io/asctheone/bifrost-updater:latest
            ghcr.io/asctheone/bifrost-updater:${{ steps.ver.outputs.v }}
            ghcr.io/asctheone/bifrost-updater:${{ github.sha }}

  # Build the GL.iNet/OpenWrt package as an opkg feed (ipk + Packages index). The
  # `release` job below publishes it; this one only builds, so PRs still catch a
  # broken ipk without publishing anything.
  openwrt:
    name: Build GL.iNet package (opkg feed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read unified version
        id: ver
        run: echo "v=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      # Produces dist/{bifrost_<version>_all.ipk, Packages, Packages.gz} — the same
      # script the server image uses to bake its own /bifrost/feed, so the two feeds
      # can never drift.
      - name: Build ipk + opkg index
        run: |
          chmod +x scripts/build-feed.sh apps/openwrt-client/build-ipk.sh
          bash scripts/build-feed.sh dist

      # Guard against publishing a feed a router would choke on: the index must
      # advertise the package at the version we think we built.
      - name: Verify feed
        run: |
          set -euo pipefail
          v='${{ steps.ver.outputs.v }}'
          test -f "dist/bifrost_${v}_all.ipk" || { echo "::error::expected dist/bifrost_${v}_all.ipk"; exit 1; }
          grep -qx "Package: bifrost" dist/Packages || { echo "::error::Packages index has no bifrost entry"; exit 1; }
          grep -qx "Version: ${v}" dist/Packages || { echo "::error::Packages index version != ${v}"; exit 1; }
          # The ipk must be a gzip'd tar (the legacy ipkg format opkg accepts) —
          # an ar archive here is the classic "Malformed package file" on GL.iNet.
          gzip -t "dist/bifrost_${v}_all.ipk"
          echo "feed OK:"; cat dist/Packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-openwrt-ipk
          path: dist/

  # Static spark binaries, so `install-spark.sh` can install the spark as a plain
  # systemd service on a host with no Docker. reqwest is on rustls (no OpenSSL), so
  # a musl build links fully static and runs on any glibc/musl distro.
  spark-binaries:
    name: Build spark binary (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # No rust-cache here on purpose: `cross` compiles build scripts inside its musl
      # container, and a restored target/ from the host `cargo build` job (newer glibc)
      # gets reused inside that older container — the build script then fails with
      # `GLIBC_2.28 not found`. A clean target/ keeps every artifact container-built.
      # `cross` runs the build in a container with the right musl toolchain, so
      # aarch64 doesn't need a hand-assembled cross-linker on the runner.
      - name: Install cross
        run: cargo install cross --locked
      - name: Build
        working-directory: apps/spark
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Stage + smoke-check
        working-directory: apps/spark
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/bifrost-spark"
          file "$bin"
          # A dynamically-linked binary would die with a confusing loader error on
          # the user's host, so reject that specifically. Note musl emits a
          # "static-pie linked" binary on x86_64 and "statically linked" on aarch64 —
          # both are static, so assert the absence of a dynamic link rather than
          # matching one of those spellings.
          if file "$bin" | grep -q "dynamically linked"; then
            echo "::error::$bin is dynamically linked — it must be static"
            exit 1
          fi
          mkdir -p ../../dist
          install -m 0755 "$bin" "../../dist/bifrost-spark-${{ matrix.arch }}-linux"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-spark-${{ matrix.arch }}
          path: dist/

  # One publisher for every release asset. Both build jobs feed it, so the ipk feed
  # and the spark binaries land in the same release instead of racing to create it.
  release:
    name: Publish release (opkg feed + spark binaries)
    runs-on: ubuntu-latest
    needs: [openwrt, spark-binaries]
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: write # create releases + upload assets
    steps:
      - uses: actions/checkout@v4
      - name: Read unified version
        id: ver
        run: echo "v=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      # Only our own build outputs. Without a pattern this also pulls the
      # `.dockerbuild` summary artifact that docker/build-push-action uploads, which
      # is both useless here and — when that job fails — undownloadable, which then
      # fails the release for a reason having nothing to do with the release.
      - uses: actions/download-artifact@v4
        with:
          pattern: bifrost-*
          path: staged
      - name: Collect assets
        run: |
          set -euo pipefail
          mkdir -p dist
          find staged -type f -exec cp {} dist/ \;
          # install-spark.sh verifies downloads against this before installing.
          ( cd dist && sha256sum bifrost-spark-* > SHA256SUMS )
          ls -l dist

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.v }}
        run: |
          set -euo pipefail
          assets=(
            "dist/bifrost_${V}_all.ipk" dist/Packages dist/Packages.gz
            dist/bifrost-spark-x86_64-linux dist/bifrost-spark-aarch64-linux dist/SHA256SUMS
          )
          for a in "${assets[@]}"; do
            test -f "$a" || { echo "::error::missing release asset $a"; exit 1; }
          done

          # Heredoc (not an inline --notes string): keeps the body free of the
          # YAML block's indentation, which Markdown would render as code.
          cat > notes.md <<EOF
          ## Dashboard

          <https://dash.asc.ninja/bifrost>

          ## Spark

          Install or update a spark (asks Docker or systemd on first run; remembers
          the choice, so re-running just updates):

          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/install-spark.sh | sh
          \`\`\`

          ## GL.iNet / OpenWrt router

          Package feed: <https://github.com/${{ github.repository }}/releases/latest/download>

          \`\`\`sh
          echo 'src/gz bifrost https://github.com/${{ github.repository }}/releases/latest/download' >> /etc/opkg/customfeeds.conf
          opkg update && opkg install bifrost
          \`\`\`

          The router's config page is then at **<https://bifrost.lan/>** (self-signed —
          your browser will warn once; no CA can issue a trusted cert for a \`.lan\`
          name). Plain <http://bifrost.lan/> works too, as does
          \`http://<router-ip>:8099/\`.
          EOF
          sed -i 's/^          //' notes.md

          if gh release view "v${V}" >/dev/null 2>&1; then
            echo "release v${V} exists — replacing assets"
            gh release upload "v${V}" "${assets[@]}" --clobber
          else
            gh release create "v${V}" "${assets[@]}" --title "v${V}" --notes-file notes.md
          fi
