name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # Core correctness: build + unit-test the Rust crates that make up the current
  # architecture (control plane + on-site spark). No secrets required.
  rust:
    name: Rust build & test (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [apps/spark-server, apps/spark]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}
      - name: Build
        run: cargo build --manifest-path ${{ matrix.crate }}/Cargo.toml
      - name: Test
        run: cargo test --manifest-path ${{ matrix.crate }}/Cargo.toml

  # Prove the deployable image builds (dashboard + server). The dashboard pulls
  # FontAwesome Pro packages, so this needs the FONTAWESOME_TOKEN secret; when it
  # isn't set (e.g. on forks) the job no-ops with a warning instead of failing.
  image:
    name: Build server image
    runs-on: ubuntu-latest
    env:
      FA_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip notice (no token)
        if: ${{ env.FA_TOKEN == '' }}
        run: echo "::warning::FONTAWESOME_TOKEN secret not set — skipping dashboard/image build. Add it in Settings → Secrets and variables → Actions to enable."
      - name: Build unified server image (dashboard + Rust)
        if: ${{ env.FA_TOKEN != '' }}
        run: |
          printf '%s' "$FA_TOKEN" > fa_token
          DOCKER_BUILDKIT=1 docker build \
            -f apps/spark-server/Dockerfile \
            --secret id=fontawesome_token,src=fa_token \
            -t bifrost-server:ci .
          rm -f fa_token
